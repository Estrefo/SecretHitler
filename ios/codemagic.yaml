workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get packages
        script: flutter packages pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com

  ios-workflow:
    name: iOS Build
    max_build_duration: 45
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get packages
        script: flutter packages pub get
      - name: Decode Firebase config
        script: |
          echo $FIREBASE_IOS_SECRET | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist
      - name: Build iOS
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.ipa
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com